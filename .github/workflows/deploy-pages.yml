# Publishes the app to GitHub Pages automatically on every push to `main`.
# One-time setup: repo Settings ▸ Pages ▸ Build and deployment ▸ Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; newer pushes cancel older in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turn GitHub Pages on automatically (no manual toggle)

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # the app is static at the repo root — publish everything

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
